<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>Fiche de vérification — VPS (plan cliquable)</title>
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=Roboto+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
:root{
  --navy:#122A52;
  --navy-deep:#0A1830;
  --navy-mid:#1B3A6B;
  --orange:#F0791E;
  --orange-light:#FFB067;
  --paper:#F6F3EC;
  --paper-card:#FFFFFF;
  --paper-line:#E4DFD2;
  --ink:#1B1E26;
  --ink-soft:#5B6270;
  --ok:#2E8B4F;
  --ok-bg:#E7F3EA;
  --anomaly:#D2453A;
  --anomaly-bg:#FBEAE8;
  --untouched:#C7CCD6;
  --untouched-bg:#F1F1EE;
  --radius:10px;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  background:var(--paper);
  font-family:'Inter',system-ui,sans-serif;
  color:var(--ink);
  padding-bottom:110px;
}
.hidden{display:none !important;}

/* ---------- HEADER / DASHBOARD ---------- */
.app-header{
  background:linear-gradient(160deg,var(--navy) 0%,var(--navy-deep) 100%);
  color:#fff;
  padding:18px 20px 14px;
  position:sticky;
  top:0;
  z-index:40;
  box-shadow:0 4px 18px rgba(10,24,48,.35);
}
.header-row{
  display:flex;
  align-items:center;
  gap:16px;
  flex-wrap:wrap;
}
.brand{
  display:flex;
  align-items:center;
  gap:10px;
  flex:1 1 220px;
  min-width:200px;
}
.brand svg{flex:0 0 auto;}
.brand-text .eyebrow{
  font-family:'Roboto Mono',monospace;
  font-size:10px;
  letter-spacing:.14em;
  color:var(--orange-light);
  text-transform:uppercase;
}
.brand-text h1{
  font-family:'Oswald',sans-serif;
  font-weight:600;
  font-size:20px;
  letter-spacing:.02em;
  margin:1px 0 0;
  text-transform:uppercase;
}
.brand-text .sub{
  font-size:11px;
  color:#B9C4DA;
  margin-top:1px;
}
.meta-fields{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  flex:2 1 320px;
}
.meta-fields .field{
  display:flex;
  flex-direction:column;
  gap:3px;
}
.meta-fields label{
  font-size:9px;
  text-transform:uppercase;
  letter-spacing:.1em;
  color:var(--orange-light);
  font-weight:600;
}
.meta-fields input{
  background:rgba(255,255,255,.13);
  border:1.5px solid rgba(255,255,255,.4);
  color:#fff;
  border-radius:6px;
  padding:7px 10px;
  font-family:'Inter',sans-serif;
  font-size:14px;
  min-width:110px;
}
.meta-fields input::placeholder{color:#8FA0C2;}
.meta-fields input:focus{outline:2px solid var(--orange);outline-offset:1px;}

.dash-instruments{
  display:flex;
  align-items:center;
  gap:14px;
}
.dial-wrap{
  position:relative;
  width:74px;
  height:74px;
  flex:0 0 auto;
}
.dial-wrap svg{transform:rotate(-90deg);width:100%;height:100%;}
.dial-track{stroke:rgba(255,255,255,.14);}
.dial-progress{
  stroke:var(--orange);
  stroke-linecap:round;
  transition:stroke-dashoffset .35s ease;
}
.dial-center{
  position:absolute;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-direction:column;
}
.dial-center .pct{
  font-family:'Roboto Mono',monospace;
  font-weight:700;
  font-size:16px;
  line-height:1;
}
.dial-center .lbl{
  font-size:7px;
  letter-spacing:.08em;
  color:#9FB0CE;
  text-transform:uppercase;
  margin-top:2px;
}
.digital-counter{
  background:#050D1C;
  border:1px solid rgba(255,255,255,.12);
  border-radius:7px;
  padding:6px 12px;
  text-align:center;
  min-width:70px;
}
.digital-counter .num{
  font-family:'Roboto Mono',monospace;
  font-weight:700;
  font-size:20px;
  color:var(--anomaly);
  text-shadow:0 0 8px rgba(210,69,58,.6);
  line-height:1;
}
.digital-counter.zero .num{
  color:var(--ok);
  text-shadow:0 0 8px rgba(46,139,79,.55);
}
.digital-counter .cap{
  font-size:8px;
  letter-spacing:.1em;
  color:#7C8BAA;
  text-transform:uppercase;
  margin-top:3px;
}

/* legend */
.legend{
  display:flex;
  gap:14px;
  margin-top:12px;
  flex-wrap:wrap;
}
.legend .li{
  display:flex;
  align-items:center;
  gap:6px;
  font-size:11px;
  color:#C9D2E4;
}
.legend .sw{
  width:11px;height:11px;border-radius:3px;
  flex:0 0 auto;
}
.sw.untouched{background:var(--untouched);}
.sw.ok{background:var(--ok);}
.sw.anomaly{background:var(--anomaly);}

/* ---------- PAGE TABS ---------- */
.page-tabs{
  max-width:900px;
  margin:16px auto 0;
  padding:0 16px;
  display:flex;
  gap:8px;
}
.page-tab{
  flex:1 1 auto;
  background:var(--paper-card);
  border:1.5px solid var(--paper-line);
  border-radius:10px;
  padding:11px 12px;
  cursor:pointer;
  text-align:center;
  font-family:'Inter',sans-serif;
  transition:border-color .15s, background .15s;
}
.page-tab .pt-title{
  font-family:'Oswald',sans-serif;
  font-size:13px;
  text-transform:uppercase;
  color:var(--navy);
  letter-spacing:.02em;
}
.page-tab .pt-stats{
  font-family:'Roboto Mono',monospace;
  font-size:11px;
  color:var(--ink-soft);
  margin-top:2px;
}
.page-tab .pt-stats .anomaly-count{color:var(--anomaly);font-weight:700;}
.page-tab.active{
  border-color:var(--orange);
  background:#FFF7EF;
  box-shadow:0 0 0 1px var(--orange);
}

/* ---------- MAIN ---------- */
main{
  max-width:900px;
  margin:20px auto 0;
  padding:0 16px;
}
.plan-card{
  background:var(--paper-card);
  border:1px solid var(--paper-line);
  border-radius:var(--radius);
  box-shadow:0 1px 3px rgba(20,25,40,.07);
  overflow:hidden;
}
.plan-caption{
  padding:12px 16px;
  border-bottom:1px solid var(--paper-line);
}
.plan-caption h2{
  font-family:'Oswald',sans-serif;
  font-size:15px;
  text-transform:uppercase;
  color:var(--navy);
  margin:0;
}
.plan-caption p{
  font-size:12px;
  color:var(--ink-soft);
  margin:2px 0 0;
}
.plan-wrap{
  position:relative;
  width:100%;
  line-height:0;
  background:#fff;
}
.plan-wrap img{
  display:block;
  width:100%;
  height:auto;
}
.zone-hotspot{
  position:absolute;
  border:2px solid rgba(18,42,82,.55);
  border-radius:6px;
  cursor:pointer;
  background:rgba(18,42,82,.10);
  transition:background .15s, border-color .15s;
}
.zone-hotspot:hover, .zone-hotspot:active{
  background:rgba(240,121,30,.22);
  border-color:var(--orange);
}
.zone-hotspot.zone-ok{
  background:rgba(46,139,79,.22);
  border:2px solid var(--ok);
}
.zone-hotspot.zone-anomaly{
  background:rgba(210,69,58,.24);
  border:2px solid var(--anomaly);
}
.zone-pin{
  position:absolute;
  left:50%;
  top:50%;
  transform:translate(-50%,-50%);
  min-width:26px;height:26px;
  padding:0 5px;
  border-radius:13px;
  background:var(--orange);
  color:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  font-family:'Roboto Mono',monospace;
  font-weight:700;
  font-size:12px;
  white-space:nowrap;
  box-shadow:0 2px 6px rgba(0,0,0,.45), 0 0 0 3px #fff;
  pointer-events:none;
  z-index:2;
}
.zone-pin svg{width:14px;height:14px;}
.zone-hotspot.zone-ok .zone-pin{background:var(--ok);}
.zone-hotspot.zone-anomaly .zone-pin{background:var(--anomaly);}
.zone-badge{
  position:absolute;
  top:3px;
  right:3px;
  width:20px;height:20px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  box-shadow:0 1px 3px rgba(0,0,0,.3);
}
.zone-badge svg{width:12px;height:12px;color:#fff;}
.zone-badge.ok{background:var(--ok);}
.zone-badge.anomaly{background:var(--anomaly);}

.zone-list-note{
  padding:12px 16px 4px;
  font-size:12px;
  color:var(--ink-soft);
  text-align:center;
}
.comment-block{
  padding:6px 16px 18px;
  border-top:1px solid var(--paper-line);
  margin-top:6px;
  padding-top:14px;
}
.comment-block label{
  display:block;
  font-size:12px;
  font-weight:600;
  color:var(--navy);
  margin-bottom:6px;
}
.comment-block textarea{
  border-color:var(--paper-line);
}
.comment-block textarea:focus{
  outline:none;
  border-color:var(--navy-mid);
}

/* ---------- MODAL (zone checklist) ---------- */
.modal-overlay{
  position:fixed;inset:0;
  background:rgba(10,20,40,.55);
  display:flex;align-items:flex-end;justify-content:center;
  z-index:100;
  padding:0;
}
@media(min-width:640px){
  .modal-overlay{align-items:center;padding:20px;}
}
.modal{
  background:#fff;
  width:100%;
  max-width:560px;
  max-height:88vh;
  overflow-y:auto;
  border-radius:14px 14px 0 0;
  padding:0;
}
@media(min-width:640px){.modal{border-radius:14px;}}
.modal-head{
  position:sticky;
  top:0;
  background:#fff;
  padding:16px 18px 12px;
  border-bottom:1px solid var(--paper-line);
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  z-index:5;
}
.modal-head h3{
  font-family:'Oswald',sans-serif;
  text-transform:uppercase;
  color:var(--navy);
  margin:0;
  font-size:18px;
}
.modal-head .modal-sub{
  font-family:'Roboto Mono',monospace;
  font-size:11px;
  color:var(--ink-soft);
  margin-top:3px;
}
.modal-close{
  background:none;border:none;cursor:pointer;color:var(--ink-soft);
  font-size:22px;line-height:1;padding:2px 4px;
}
.modal-body{padding:6px 16px 18px;}
.btn-all-ok{
  font-family:'Inter',sans-serif;
  font-size:12px;
  color:var(--navy-mid);
  background:none;
  border:1px solid var(--paper-line);
  border-radius:6px;
  padding:5px 10px;
  cursor:pointer;
  white-space:nowrap;
  margin:10px 0 4px;
}
.btn-all-ok:hover{background:var(--untouched-bg);}

.group-head{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:8px;
  margin-top:16px;
  padding-bottom:5px;
  border-bottom:2px solid var(--navy);
}
.group-head:first-child{margin-top:6px;}
.group-head .group-title{
  font-family:'Oswald',sans-serif;
  font-size:13.5px;
  text-transform:uppercase;
  letter-spacing:.04em;
  color:var(--navy);
}
.group-head .btn-all-ok{margin:0;}

.item-row{
  display:grid;
  grid-template-columns:1fr auto;
  align-items:center;
  gap:10px;
  padding:9px 2px;
  border-radius:7px;
  transition:background .2s;
  border-bottom:1px solid #F1EEE4;
}
.item-row.is-anomaly{background:var(--anomaly-bg);}
.item-row.is-ok{background:transparent;}
.item-info{min-width:0;}
.item-name{
  font-size:13.5px;
  line-height:1.35;
}
.item-name .warn-tag{
  display:inline-block;
  font-size:9.5px;
  font-weight:700;
  color:#fff;
  background:var(--anomaly);
  padding:1px 6px;
  border-radius:4px;
  margin-left:6px;
  vertical-align:middle;
  text-transform:uppercase;
}
.item-expected{
  font-family:'Roboto Mono',monospace;
  font-size:11px;
  color:var(--ink-soft);
  margin-top:1px;
}
.item-expected b{color:var(--ink);}

.item-controls{
  display:flex;
  align-items:center;
  gap:6px;
  flex:0 0 auto;
}
.status-btn{
  width:32px;height:32px;
  border-radius:8px;
  border:1.5px solid var(--paper-line);
  background:#fff;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  color:var(--ink-soft);
  transition:all .15s;
  flex:0 0 auto;
}
.status-btn svg{width:16px;height:16px;}
.status-btn.ok-btn.active{background:var(--ok);border-color:var(--ok);color:#fff;}
.status-btn.anomaly-btn.active{background:var(--anomaly);border-color:var(--anomaly);color:#fff;}
.status-btn:not(.active):hover{border-color:var(--navy-mid);color:var(--navy-mid);}

.qty-input{
  width:52px;
  text-align:center;
  font-family:'Roboto Mono',monospace;
  font-size:13px;
  font-weight:700;
  padding:6px 2px;
  border-radius:7px;
  border:1.5px solid var(--anomaly);
  color:var(--anomaly);
  background:#fff;
}
.qty-input:focus{outline:none;border-color:var(--anomaly);}

.note-row{grid-column:1/-1;margin-top:2px;}
.note-input{
  width:100%;
  font-family:'Inter',sans-serif;
  font-size:12.5px;
  padding:7px 9px;
  border-radius:7px;
  border:1px solid #E9B9B4;
  background:#fff;
  color:var(--ink);
  resize:vertical;
  min-height:32px;
}
.note-input::placeholder{color:#B98A85;}

/* ---------- FOOTER ACTION BAR ---------- */
.action-bar{
  position:fixed;
  bottom:0;left:0;right:0;
  background:#fff;
  border-top:1px solid var(--paper-line);
  padding:10px 16px;
  display:flex;
  gap:8px;
  justify-content:center;
  z-index:50;
  box-shadow:0 -4px 14px rgba(20,25,40,.08);
}
.action-bar button{
  font-family:'Inter',sans-serif;
  font-weight:600;
  font-size:13px;
  padding:11px 16px;
  border-radius:8px;
  border:none;
  cursor:pointer;
  display:flex;
  align-items:center;
  gap:6px;
}
.btn-primary{background:var(--orange);color:#fff;flex:1 1 auto;justify-content:center;max-width:280px;}
.btn-primary:hover{background:#DB6C13;}
.btn-ghost{background:none;color:var(--ink-soft);border:1px solid var(--paper-line) !important;}
.btn-ghost:hover{background:var(--untouched-bg);}

/* history modal reuses .modal */
.history-item{
  border:1px solid var(--paper-line);
  border-radius:9px;
  padding:11px 13px;
  margin-bottom:8px;
  cursor:pointer;
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:10px;
}
.history-item:hover{border-color:var(--navy-mid);}
.history-item .hi-left b{display:block;font-size:14px;}
.history-item .hi-left span{font-size:11.5px;color:var(--ink-soft);}
.history-item .hi-badge{
  font-family:'Roboto Mono',monospace;
  font-size:12px;
  font-weight:700;
  padding:4px 9px;
  border-radius:6px;
  white-space:nowrap;
}
.hi-badge.ok{background:var(--ok-bg);color:var(--ok);}
.hi-badge.bad{background:var(--anomaly-bg);color:var(--anomaly);}
.empty-note{font-size:13px;color:var(--ink-soft);text-align:center;padding:20px 0;}
.record-anomaly-line{
  font-size:13px;
  padding:8px 0;
  border-bottom:1px solid var(--paper-line);
}
.record-anomaly-line b{color:var(--anomaly);}
.record-anomaly-line .ra-note{color:var(--ink-soft);font-size:12px;margin-top:2px;}

/* Restock list */
.restock-zone-group{margin-bottom:16px;}
.restock-zone-head{
  font-family:'Oswald',sans-serif;
  font-size:13px;
  text-transform:uppercase;
  letter-spacing:.04em;
  color:#fff;
  background:var(--navy);
  padding:6px 10px;
  border-radius:6px;
  margin-bottom:6px;
}
.restock-item{
  display:flex;
  justify-content:space-between;
  align-items:baseline;
  gap:10px;
  padding:7px 4px;
  border-bottom:1px dashed var(--paper-line);
  font-size:13.5px;
}
.restock-item .ri-need{
  font-family:'Roboto Mono',monospace;
  font-weight:700;
  color:var(--anomaly);
  white-space:nowrap;
  flex:0 0 auto;
}

@media (max-width:480px){
  .app-header{padding:12px 14px 10px;}
  .brand-text .eyebrow{font-size:8.5px;}
  .brand-text h1{font-size:16px;}
  .header-row{gap:10px;}
  .brand{flex-basis:auto;min-width:0;}
  .meta-fields{order:2;flex-basis:100%;width:100%;}
  .meta-fields .field{width:100%;}
  .meta-fields label{font-size:10.5px;}
  .meta-fields input{width:100%;font-size:15px;padding:9px 11px;min-width:0;}
  .dash-instruments{order:3;width:100%;justify-content:flex-start;margin-top:2px;gap:10px;}
  .dial-wrap{width:56px;height:56px;}
  .digital-counter{padding:4px 10px;min-width:56px;}
  .legend{margin-top:8px;gap:10px;}
  .legend .li{font-size:10px;}
  .action-bar{padding:8px 8px;gap:5px;}
  .action-bar button{padding:10px 8px;font-size:11.5px;gap:3px;}
  .btn-primary{max-width:none;}
}
</style>
</head>
<body>

<header class="app-header">
  <div class="header-row">
    <div class="brand">

      <div class="brand-text">
        <div class="eyebrow">Protection Civile — Antenne Paris 19</div>
        <h1>Fiche de vérification VPS</h1>
      </div>
    </div>

    <div class="meta-fields">
      <div class="field">
        <label for="f-agent">Vérificateur</label>
        <input id="f-agent" type="text" placeholder="Nom / prénom">
      </div>
    </div>

    <div class="dash-instruments">
      <div class="dial-wrap">
        <svg viewBox="0 0 74 74" width="74" height="74">
          <circle class="dial-track" cx="37" cy="37" r="31" fill="none" stroke-width="7"/>
          <circle id="dial-progress" class="dial-progress" cx="37" cy="37" r="31" fill="none" stroke-width="7"
            stroke-dasharray="194.8" stroke-dashoffset="194.8"/>
        </svg>
        <div class="dial-center">
          <span class="pct" id="pct-label">0%</span>
          <span class="lbl">Vérifié</span>
        </div>
      </div>
      <div class="digital-counter zero" id="digital-counter">
        <div class="num" id="anomaly-num">0</div>
        <div class="cap">Anomalies</div>
      </div>
    </div>
  </div>

  <div class="legend">
    <div class="li"><span class="sw untouched"></span> Zone non vérifiée</div>
    <div class="li"><span class="sw ok"></span> Conforme</div>
    <div class="li"><span class="sw anomaly"></span> Anomalie</div>
  </div>
</header>

<div class="page-tabs" id="page-tabs"></div>

<main>
  <div class="plan-card">
    <div class="plan-caption">
      <h2 id="plan-title">Plan</h2>
      <p id="plan-sub">Touchez une zone pour ouvrir sa checklist.</p>
    </div>
    <div class="plan-wrap" id="plan-wrap">
      <img src="" alt="Plan" id="plan-img">
      <!-- hotspots injected by JS -->
    </div>
    <div class="comment-block">
      <label for="global-comment">Commentaire (problème non listé, remarque…)</label>
      <textarea id="global-comment" class="note-input" rows="3" placeholder="Ex : fuite sur la bouteille O2, roue avant gauche à vérifier…"></textarea>
    </div>
  </div>
</main>

<div class="action-bar">
  <button class="btn-ghost" id="btn-restock">Réassort</button>
  <button class="btn-primary" id="btn-finalize">Enregistrer</button>
</div>

<div class="modal-overlay hidden" id="zone-overlay">
  <div class="modal">
    <div class="modal-head">
      <div>
        <h3 id="zone-title">Zone</h3>
        <div class="modal-sub" id="zone-sub"></div>
      </div>
      <button class="modal-close" id="close-zone">×</button>
    </div>
    <div class="modal-body" id="zone-body"></div>
  </div>
</div>

<div class="modal-overlay hidden" id="restock-overlay">
  <div class="modal">
    <div class="modal-head">
      <div>
        <h3>Liste de réassort</h3>
        <div class="modal-sub" id="restock-sub"></div>
      </div>
      <button class="modal-close" id="close-restock">×</button>
    </div>
    <div class="modal-body" id="restock-body"></div>
  </div>
</div>

<script>
/* ============================================================

/* ============================================================
   OUTILS GÉNÉRIQUES — construction des zones/hotspots
   ============================================================ */
let _idc = 0;
function makeItem(it, zoneId){
  _idc++;
  return {
    id: 'i' + _idc,
    name: it.name,
    type: it.type || 'qty',
    qty: it.qty || null,
    warn: it.warn || null,
    zoneId: zoneId,
  };
}
function buildZones(rawArray){
  return rawArray.map(z => {
    let groups;
    if(z.groups){
      groups = z.groups.map(g => ({
        title: g.title,
        items: g.items.map(it => makeItem(it, z.id))
      }));
    } else {
      groups = [{ title: null, items: z.items.map(it => makeItem(it, z.id)) }];
    }
    const flatItems = [];
    groups.forEach(g => g.items.forEach(it => flatItems.push(it)));
    return { id: z.id, label: z.label, code: z.code, groups, items: flatItems };
  });
}
function zoneRect(id, x, y, w, h, label){
  return { zoneId:id, rect:{x,y,w,h}, label: label || null };
}

  p.zoneOrder = (zoneId) => {

/* Recherche globale d'une zone par id, toutes pages confondues (les ids sont uniques) */
function findZone(zoneId){
  for(const p of PAGES){
    const z = p.zones.find(zz => zz.id === zoneId);
    if(z) return z;
  }
  return null;
}
function pageOfZone(zoneId){
  return PAGES.find(p => p.zones.some(z => z.id === zoneId));
}

/* ============================================================
   STORAGE HELPERS
   ============================================================ */
async function storageGet(key){
  try{ const r = await window.storage.get(key, false); return r ? r.value : null; }
  catch(e){ return null; }
}
async function storageSet(key, value){
  try{ return await window.storage.set(key, value, false); }
  catch(e){ console.error('storage set failed', e); return null; }
}
async function storageDelete(key){
  try{ return await window.storage.delete(key, false); } catch(e){ return null; }
}

let saveTimer = null;
function scheduleAutosave(){
  clearTimeout(saveTimer);
  saveTimer = setTimeout(saveCurrent, 500);
}
async function saveCurrent(){
  const payload = {
    agent: document.getElementById('f-agent').value,
    comment: document.getElementById('global-comment').value,
    state
  };
  await storageSet('verif:current', JSON.stringify(payload));
}
async function loadCurrent(){
  const raw = await storageGet('verif:current');
  if(!raw) return false;
  try{
    const payload = JSON.parse(raw);
    if(payload.agent) document.getElementById('f-agent').value = payload.agent;
    if(payload.comment) document.getElementById('global-comment').value = payload.comment;
    if(payload.state){
      Object.keys(payload.state).forEach(id => { if(state[id]) state[id] = payload.state[id]; });
    }
    return true;
  }catch(e){ return false; }
}

const tabsWrap = document.getElementById('page-tabs');
function buildTabs(){
  tabsWrap.innerHTML = '';
  PAGES.forEach((p, idx) => {
    const tab = document.createElement('div');
    tab.className = 'page-tab';
    tab.id = 'tab-' + idx;
    tab.innerHTML = `
      <div class="pt-title">${p.title}</div>
      <div class="pt-stats" id="tab-stats-${idx}"></div>
    `;
    tab.addEventListener('click', () => switchPage(idx));
    tabsWrap.appendChild(tab);
  });
}
function refreshTabs(){
  PAGES.forEach((p, idx) => {
    let touched = 0, anomalies = 0;
    p.allItems.forEach(it => {
      const s = state[it.id];
      if(s.touched) touched++;
      if(s.status === 'anomaly') anomalies++;
    });
    const el = document.getElementById('tab-stats-' + idx);
    el.innerHTML = `${touched}/${p.totalItems}` + (anomalies > 0 ? ` · <span class="anomaly-count">${anomalies} !</span>` : '');
    document.getElementById('tab-' + idx).classList.toggle('active', idx === currentPageIndex);
  });
}

const planWrap = document.getElementById('plan-wrap');
const planImg = document.getElementById('plan-img');

function switchPage(idx){
  currentPageIndex = idx;
  renderCurrentPage();
}

function renderCurrentPage(){
  const p = PAGES[currentPageIndex];
  document.getElementById('plan-title').textContent = p.title;
  document.getElementById('plan-sub').textContent = p.subtitle;
  planImg.src = p.image;
  planImg.alt = p.title;

  // remove old hotspots
  planWrap.querySelectorAll('.zone-hotspot').forEach(el => el.remove());

  p.hotspots.forEach((h, idx) => {
    const z = findZone(h.zoneId);
    const tag = p.zoneTag(h.zoneId);
    const hs = document.createElement('div');
    hs.className = 'zone-hotspot';
    hs.id = 'hs-' + idx;
    hs.dataset.zoneId = h.zoneId;
    hs.style.left = h.rect.x + '%';
    hs.style.top = h.rect.y + '%';
    hs.style.width = h.rect.w + '%';
    hs.style.height = h.rect.h + '%';
    const fontSize = tag.length >= 9 ? '7.5px' : tag.length >= 3 ? '9px' : '12px';
    hs.innerHTML = `<span class="zone-pin" id="pin-${idx}" style="font-size:${fontSize}">${tag}</span>`;
    hs.addEventListener('click', () => openZone(h.zoneId));
    planWrap.appendChild(hs);
  });

  refreshHotspots();
}

function computeZoneStats(z){
  let touched = 0, anomalies = 0;
  z.items.forEach(it => {
    const s = state[it.id];
    if(s.touched) touched++;
    if(s.status === 'anomaly') anomalies++;
  });
  return { touched, anomalies, total: z.items.length };
}

function refreshHotspots(){
  const p = PAGES[currentPageIndex];
  let totalTouched = 0, totalAnomalies = 0;

  p.zones.forEach((z) => {
    const { touched, anomalies, total } = computeZoneStats(z);
    totalTouched += touched;
    totalAnomalies += anomalies;
    const tag = p.zoneTag(z.id);

    let statusClass = null;
    if(touched === total && total > 0){
      statusClass = anomalies > 0 ? 'zone-anomaly' : 'zone-ok';
    }

    p.hotspots.forEach((h, idx) => {
      if(h.zoneId !== z.id) return;
      const hs = document.getElementById('hs-' + idx);
      const pin = document.getElementById('pin-' + idx);
      if(!hs || !pin) return;
      hs.classList.remove('zone-ok','zone-anomaly');
      if(statusClass){
        hs.classList.add(statusClass);
        pin.innerHTML = statusClass === 'zone-ok' ? svgCheck() : svgExcl();
      } else {
        pin.textContent = tag;
      }
    });
  });

  const pct = p.totalItems ? Math.round((totalTouched / p.totalItems) * 100) : 0;
  const circumference = 194.8;
  const offset = circumference * (1 - pct / 100);
  document.getElementById('dial-progress').setAttribute('stroke-dashoffset', offset.toFixed(1));
  document.getElementById('pct-label').textContent = pct + '%';

  const counterEl = document.getElementById('digital-counter');
  document.getElementById('anomaly-num').textContent = totalAnomalies;
  counterEl.classList.toggle('zero', totalAnomalies === 0);

  refreshTabs();
  scheduleAutosave();
}

/* Empêche le fond de défiler (glisser) quand une modale est ouverte, sur mobile en particulier */
let _lockedScrollY = 0;
function lockBackgroundScroll(){
  _lockedScrollY = window.scrollY;
  document.body.style.position = 'fixed';
  document.body.style.top = -_lockedScrollY + 'px';
  document.body.style.left = '0';
  document.body.style.right = '0';
  document.body.style.width = '100%';
}
function unlockBackgroundScroll(){
  document.body.style.position = '';
  document.body.style.top = '';
  document.body.style.left = '';
  document.body.style.right = '';
  document.body.style.width = '';
  window.scrollTo(0, _lockedScrollY);
}

function openZone(zoneId){
  currentZoneId = zoneId;
  const z = findZone(zoneId);
  const p = pageOfZone(zoneId);
  const tag = p.zoneTag(zoneId);
  document.getElementById('zone-title').textContent = tag + ' · ' + z.label;
  document.getElementById('zone-sub').textContent = z.code + ' · ' + z.items.length + ' élément' + (z.items.length>1?'s':'');

  const body = document.getElementById('zone-body');
  body.innerHTML = '';

  const allOkBtn = document.createElement('button');
  allOkBtn.className = 'btn-all-ok';
  allOkBtn.textContent = 'Tout conforme';
  allOkBtn.addEventListener('click', () => {
    z.items.forEach(it => markOk(it));
    renderZoneItems(z);
    refreshHotspots();
  });
  body.appendChild(allOkBtn);

  const list = document.createElement('div');
  list.id = 'zone-item-list';
  body.appendChild(list);

  renderZoneItems(z);
  lockBackgroundScroll();
  document.getElementById('zone-overlay').classList.remove('hidden');
}

function renderZoneItems(z){
  const list = document.getElementById('zone-item-list');
  list.innerHTML = '';
  const hasNamedGroups = z.groups.length > 1 || (z.groups[0] && z.groups[0].title);
  z.groups.forEach(g => {
    if(hasNamedGroups && g.title){
      const head = document.createElement('div');
      head.className = 'group-head';
      const titleSpan = document.createElement('span');
      titleSpan.className = 'group-title';
      titleSpan.textContent = g.title;
      const groupOkBtn = document.createElement('button');
      groupOkBtn.className = 'btn-all-ok';
      groupOkBtn.textContent = 'Tout conforme';
      groupOkBtn.addEventListener('click', () => {
        g.items.forEach(it => markOk(it));
        renderZoneItems(z);
        refreshHotspots();
      });
      head.appendChild(titleSpan);
      head.appendChild(groupOkBtn);
      list.appendChild(head);
    }
    g.items.forEach(it => list.appendChild(buildItemRow(it)));
  });
  updateItemsUI(z);
}

function buildItemRow(it){
  const row = document.createElement('div');
  row.className = 'item-row';
  row.id = 'row-' + it.id;

  const info = document.createElement('div');
  info.className = 'item-info';
  const expectedHtml = it.type === 'qty'
    ? `<div class="item-expected">Attendu&nbsp;: <b>${it.qty}</b></div>`
    : `<div class="item-expected">Vérification fonctionnelle</div>`;
  info.innerHTML = `
    <div class="item-name">${it.name}${it.warn ? '<span class="warn-tag">'+it.warn+'</span>' : ''}</div>
    ${expectedHtml}
  `;
  row.appendChild(info);

  const controls = document.createElement('div');
  controls.className = 'item-controls';

  const okBtn = document.createElement('button');
  okBtn.className = 'status-btn ok-btn';
  okBtn.title = 'Conforme';
  okBtn.innerHTML = svgCheck();
  okBtn.addEventListener('click', () => {
    markOk(it);
    const z = findZone(it.zoneId);
    updateItemsUI(z);
    refreshHotspots();
  });

  const anomalyBtn = document.createElement('button');
  anomalyBtn.className = 'status-btn anomaly-btn';
  anomalyBtn.title = 'Anomalie';
  anomalyBtn.innerHTML = svgX();
  anomalyBtn.addEventListener('click', () => {
    markAnomaly(it);
    const z = findZone(it.zoneId);
    updateItemsUI(z);
    refreshHotspots();
  });

  controls.appendChild(okBtn);
  controls.appendChild(anomalyBtn);

  if(it.type === 'qty'){
    const qtyInput = document.createElement('input');
    qtyInput.type = 'number';
    qtyInput.min = '0';
    qtyInput.className = 'qty-input hidden';
    qtyInput.id = 'qty-' + it.id;
    qtyInput.addEventListener('input', () => {
      const v = qtyInput.value === '' ? null : parseInt(qtyInput.value, 10);
      state[it.id].value = v;
      state[it.id].touched = true;
      state[it.id].status = (v === it.qty) ? 'ok' : 'anomaly';
      const z = findZone(it.zoneId);
      updateItemsUI(z);
      refreshHotspots();
    });
    controls.appendChild(qtyInput);
  }

  row.appendChild(controls);

  const noteWrap = document.createElement('div');
  noteWrap.className = 'note-row hidden';
  noteWrap.id = 'noterow-' + it.id;
  const noteInput = document.createElement('textarea');
  noteInput.className = 'note-input';
  noteInput.id = 'note-' + it.id;
  noteInput.rows = 1;
  noteInput.placeholder = "Détail de l'anomalie (facultatif)…";
  noteInput.addEventListener('input', () => {
    state[it.id].note = noteInput.value;
    scheduleAutosave();
  });
  noteWrap.appendChild(noteInput);
  row.appendChild(noteWrap);

  return row;
}

function markOk(it){
  state[it.id].touched = true;
  state[it.id].status = 'ok';
  state[it.id].note = '';
  if(it.type === 'qty') state[it.id].value = it.qty;
  scheduleAutosave();
}
function markAnomaly(it){
  state[it.id].touched = true;
  state[it.id].status = 'anomaly';
  if(it.type === 'qty' && (state[it.id].value === null || state[it.id].value === it.qty)){
    state[it.id].value = null;
  }
  scheduleAutosave();
}

function updateItemsUI(z){
  z.items.forEach(it => {
    const s = state[it.id];
    const row = document.getElementById('row-' + it.id);
    if(!row) return;
    row.classList.remove('is-ok','is-anomaly');
    const okBtn = row.querySelector('.ok-btn');
    const anomalyBtn = row.querySelector('.anomaly-btn');
    okBtn.classList.remove('active');
    anomalyBtn.classList.remove('active');

    if(s.touched){
      if(s.status === 'anomaly'){
        row.classList.add('is-anomaly');
        anomalyBtn.classList.add('active');
      } else {
        row.classList.add('is-ok');
        okBtn.classList.add('active');
      }
    }

    if(it.type === 'qty'){
      const qtyInput = document.getElementById('qty-' + it.id);
      if(s.status === 'anomaly'){
        qtyInput.classList.remove('hidden');
        qtyInput.value = s.value === null ? '' : s.value;
      } else {
        qtyInput.classList.add('hidden');
      }
    }
    const noteRow = document.getElementById('noterow-' + it.id);
    const noteInput = document.getElementById('note-' + it.id);
    if(s.status === 'anomaly'){
      noteRow.classList.remove('hidden');
      if(document.activeElement !== noteInput) noteInput.value = s.note || '';
    } else {
      noteRow.classList.add('hidden');
    }
  });
}

/* ============================================================
   FINALIZE + ENVOI EMAIL AUTOMATIQUE  (couvre toutes les pages)
   ============================================================ */
const MAIL_TO = 'jlmrxb2@gmail.com';

function buildAnomalyList(){
  const anomalyList = [];
  ALL_ITEMS_GLOBAL.forEach(it => {
    const s = state[it.id];
    if(s.status === 'anomaly'){
      const z = findZone(it.zoneId);
      anomalyList.push({
        zoneLabel: z ? z.label : '',
        name: it.name,
        expected: it.qty,
        found: s.value,
        note: s.note,
        type: it.type
      });
    }
  });
  return anomalyList;
}

function sendReportEmail(vehicule, agent, date, anomalyList, comment){
  const n = anomalyList.length;
  const subject = `[VPS] Vérification ${date} — ${n} anomalie${n>1?'s':''}${comment.trim() ? ' + commentaire' : ''}`;

  let body = `Fiche de vérification VPS\n`;
  body += `Véhicule : ${vehicule}\n`;
  body += `Vérificateur : ${agent}\n`;
  body += `Date : ${date}\n\n`;

  if(n > 0){
    body += `ANOMALIES (${n}) :\n`;
    const maxLines = 45;
    anomalyList.slice(0, maxLines).forEach(a => {
      body += `- [${a.zoneLabel}] ${a.name}`;
      if(a.type === 'qty'){
        body += ` — attendu ${a.expected}, trouvé ${a.found === null ? '?' : a.found}`;
      } else {
        body += ` — à contrôler`;
      }
      if(a.note) body += ` (${a.note})`;
      body += `\n`;
    });
    if(anomalyList.length > maxLines){
      body += `… et ${anomalyList.length - maxLines} autre(s) anomalie(s) (liste tronquée, voir la fiche).\n`;
    }
    body += `\n`;
  }

  if(comment && comment.trim()){
    body += `COMMENTAIRE :\n${comment.trim()}\n`;
  }

  const mailto = `mailto:${MAIL_TO}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
  window.location.href = mailto;
}

async function finalizeCheck(){
  const vehicule = 'VPS';
  const agent = document.getElementById('f-agent').value || '—';
  const date = new Date().toLocaleDateString('fr-FR');
  const comment = document.getElementById('global-comment').value || '';

  let touched = 0;
  ALL_ITEMS_GLOBAL.forEach(it => { if(state[it.id].touched) touched++; });

  if(touched === 0){
    alert("Aucun élément n'a encore été vérifié sur aucune des pages.");
    return;
  }

  const anomalyList = buildAnomalyList();
  const shouldEmail = anomalyList.length > 0 || comment.trim() !== '';

  await storageDelete('verif:current');

  if(shouldEmail){
    sendReportEmail(vehicule, agent, date, anomalyList, comment);
    alert(`Vérification enregistrée.\n${anomalyList.length} anomalie(s) détectée(s)${comment.trim() ? ' + commentaire' : ''}.\nVotre appli mail va s'ouvrir avec le rapport pré-rempli pour ${MAIL_TO} — il ne reste qu'à appuyer sur Envoyer.`);
  } else {
    alert('Vérification enregistrée ✔ Aucune anomalie, aucun email nécessaire.');
  }

  resetForm();
}

function resetForm(){
  ALL_ITEMS_GLOBAL.forEach(it => { state[it.id] = { touched:false, value:null, status:null, note:'' }; });
  document.getElementById('f-agent').value = '';
  document.getElementById('global-comment').value = '';
  refreshHotspots();
  storageDelete('verif:current');
}

/* ============================================================
   RÉASSORT — liste consolidée du matériel manquant + emplacement
   (couvre toutes les pages)
   ============================================================ */
function openRestock(){
  const sub = document.getElementById('restock-sub');
  const body = document.getElementById('restock-body');
  body.innerHTML = '';

  let anomalyCount = 0;
  const groups = [];

  PAGES.forEach(p => p.zones.forEach(z => {
    const lines = [];
    z.items.forEach(it => {
      const s = state[it.id];
      if(s.status !== 'anomaly') return;
      anomalyCount++;
      if(it.type === 'qty'){
        const found = s.value === null ? 0 : s.value;
        const missing = Math.max(it.qty - found, 0);
        lines.push({
          text: it.name,
          need: missing > 0 ? `+${missing}` : '?',
          note: s.note
        });
      } else {
        lines.push({
          text: it.name,
          need: 'à contrôler',
          note: s.note
        });
      }
    });
    if(lines.length) groups.push({ zone: z, lines });
  }));

  sub.textContent = anomalyCount === 0
    ? 'Aucune anomalie détectée pour le moment.'
    : `${anomalyCount} article${anomalyCount>1?'s':''} à réapprovisionner, groupés par emplacement.`;

  if(groups.length === 0){
    body.innerHTML = '<div class="empty-note">Rien à réapprovisionner : marquez des anomalies dans les zones pour générer la liste.</div>';
    lockBackgroundScroll();
    document.getElementById('restock-overlay').classList.remove('hidden');
    return;
  }

  groups.forEach(g => {
    const groupEl = document.createElement('div');
    groupEl.className = 'restock-zone-group';
    const head = document.createElement('div');
    head.className = 'restock-zone-head';
    head.textContent = '📍 ' + g.zone.label;
    groupEl.appendChild(head);
    g.lines.forEach(l => {
      const row = document.createElement('div');
      row.className = 'restock-item';
      row.innerHTML = `<span>${l.text}${l.note ? ' — <em style="color:var(--ink-soft);font-style:normal;font-size:12px;">'+l.note+'</em>' : ''}</span><span class="ri-need">${l.need}</span>`;
      groupEl.appendChild(row);
    });
    body.appendChild(groupEl);
  });

  lockBackgroundScroll();
  document.getElementById('restock-overlay').classList.remove('hidden');
}

/* ============================================================
   INIT
   ============================================================ */
document.getElementById('btn-finalize').addEventListener('click', finalizeCheck);
document.getElementById('btn-restock').addEventListener('click', openRestock);
document.getElementById('close-zone').addEventListener('click', () => { unlockBackgroundScroll(); document.getElementById('zone-overlay').classList.add('hidden'); });
document.getElementById('close-restock').addEventListener('click', () => { unlockBackgroundScroll(); document.getElementById('restock-overlay').classList.add('hidden'); });
document.getElementById('zone-overlay').addEventListener('click', (e) => { if(e.target.id === 'zone-overlay'){ unlockBackgroundScroll(); e.target.classList.add('hidden'); } });
document.getElementById('restock-overlay').addEventListener('click', (e) => { if(e.target.id === 'restock-overlay'){ unlockBackgroundScroll(); e.target.classList.add('hidden'); } });

['f-agent','global-comment'].forEach(id => {
  document.getElementById(id).addEventListener('input', scheduleAutosave);
});

(async function init(){
  buildTabs();
  renderCurrentPage();
  const resumed = await loadCurrent();
  refreshHotspots();
})();

</script>
